<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charge équipe itroom</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #2c2c2a; min-height: 100vh; }
  
  .header { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 17px; font-weight: 500; }
  .header .subtitle { font-size: 13px; color: #73726c; margin-top: 2px; }
  
  .controls { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 12px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  
  select, button { font-family: inherit; font-size: 13px; padding: 6px 12px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: #fff; cursor: pointer; color: #2c2c2a; }
  button.primary { background: #2c2c2a; color: #fff; border-color: #2c2c2a; display: flex; align-items: center; gap: 6px; }
  button.primary:hover { background: #444; }
  button:hover { background: #f5f4f0; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .main { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .metric-card { background: #f5f4f0; border-radius: 8px; padding: 14px; }
  .metric-card .label { font-size: 12px; color: #73726c; margin-bottom: 6px; }
  .metric-card .value { font-size: 22px; font-weight: 500; }
  .metric-card .sub { font-size: 11px; color: #888780; margin-top: 2px; }
  
  .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 14px; font-weight: 500; margin-bottom: 16px; color: #444441; }
  
  .person-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .person-info { flex: 1; min-width: 0; }
  .person-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .person-email { font-size: 11px; color: #888780; }
  .bar-wrap { flex: 2; }
  .bar-track { background: #f1efe8; border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .bar-label { font-size: 11px; color: #73726c; margin-top: 3px; text-align: right; }
  .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .status-ok { background: #eaf3de; color: #3b6d11; }
  .status-warn { background: #faeeda; color: #854f0b; }
  .status-over { background: #fcebeb; color: #a32d2d; }

  .chart-wrap { position: relative; height: 220px; }
  
  .event-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
  .event-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px; background: #f5f4f0; border-radius: 8px; }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .event-title { font-size: 13px; font-weight: 500; }
  .event-meta { font-size: 11px; color: #73726c; margin-top: 2px; }
  
  .loading { text-align: center; padding: 40px; color: #73726c; }
  .spinner { width: 24px; height: 24px; border: 2px solid #d3d1c7; border-top-color: #2c2c2a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .error-box { background: #fcebeb; border: 0.5px solid #f7c1c1; border-radius: 8px; padding: 14px; font-size: 13px; color: #791f1f; }
  
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { font-size: 13px; padding: 6px 14px; border-radius: 6px; cursor: pointer; color: #73726c; border: none; background: transparent; }
  .tab.active { background: #f1efe8; color: #2c2c2a; font-weight: 500; }
  
  .heatmap { display: grid; gap: 3px; }
  .heatmap-cell { height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
  
  .ai-box { background: #f5f4f0; border-radius: 8px; padding: 14px; font-size: 13px; line-height: 1.6; color: #444441; white-space: pre-wrap; }
  
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #73726c; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div style="display:flex;align-items:center;gap:8px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <h1>Charge équipe itroom</h1>
    </div>
    <div class="subtitle">Suivi via Google Calendar</div>
  </div>
  <div style="font-size:12px;color:#888780;" id="last-updated"></div>
</div>

<div class="controls">
  <select id="period-select" onchange="onPeriodChange()">
    <option value="week">Cette semaine</option>
    <option value="next_week">Semaine prochaine</option>
    <option value="month">Ce mois</option>
    <option value="two_weeks">2 prochaines semaines</option>
  </select>
  <button class="primary" onclick="loadData()" id="refresh-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
    Actualiser
  </button>
  <div style="margin-left:auto;font-size:12px;color:#888780;">5 membres · Google Calendar</div>
</div>

<div class="main">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Connexion à Google Calendar...
    </div>
  </div>
</div>

<script>
const TEAM = [
  { id: 'lklapka',    email: 'lklapka@itroom.fr',    name: 'L. Klapka',    initials: 'LK', color: '#534AB7' },
  { id: 'fkosinski',  email: 'fkosinski@itroom.fr',  name: 'F. Kosinski',  initials: 'FK', color: '#0F6E56' },
  { id: 'mlepoutre',  email: 'mlepoutre@itroom.fr',  name: 'M. Lepoutre',  initials: 'ML', color: '#993C1D' },
  { id: 'guhlenbusch',email: 'guhlenbusch@itroom.fr',name: 'G. Uhlenbusch',initials: 'GU', color: '#993556' },
  { id: 'mcerqueira', email: 'mcerqueira@itroom.fr', name: 'M. Cerqueira',  initials: 'MC', color: '#185FA5' },
];

const BAR_COLORS = ['#534AB7','#0F6E56','#993C1D','#993556','#185FA5'];

let currentData = null;
let chartInstance = null;

function getDateRange(period) {
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  monday.setHours(0,0,0,0);
  
  let start, end;
  if (period === 'week') {
    start = monday;
    end = new Date(monday); end.setDate(monday.getDate() + 6);
  } else if (period === 'next_week') {
    start = new Date(monday); start.setDate(monday.getDate() + 7);
    end = new Date(start); end.setDate(start.getDate() + 6);
  } else if (period === 'month') {
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  } else {
    start = monday;
    end = new Date(monday); end.setDate(monday.getDate() + 13);
  }
  return { start, end };
}

function fmtDate(d) {
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
}

function onPeriodChange() { loadData(); }

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  const period = document.getElementById('period-select').value;
  const { start, end } = getDateRange(period);

  document.getElementById('content').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      Récupération des événements via Google Calendar...<br>
      <span style="font-size:12px;margin-top:6px;display:block">Du ${fmtDate(start)} au ${fmtDate(end)}</span>
    </div>`;

  try {
    const result = await fetchTeamEvents(start, end);
    currentData = result;
    renderDashboard(result, start, end);
    document.getElementById('last-updated').textContent = 'Mis à jour ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error-box">Erreur lors de la récupération des données Google Calendar.<br><br><strong>Détail :</strong> ${e.message}</div>`;
  }
  btn.disabled = false;
}

async function fetchTeamEvents(start, end) {
  const startISO = start.toISOString();
  const endISO = new Date(end.getTime() + 86400000).toISOString();
  
  const prompt = `Tu es un assistant qui analyse la charge de travail d'une équipe via Google Calendar.

MEMBRES DE L'ÉQUIPE :
${TEAM.map(m => `- ${m.name} (${m.email})`).join('\n')}

PÉRIODE : du ${start.toLocaleDateString('fr-FR')} au ${end.toLocaleDateString('fr-FR')}

Instructions :
1. Récupère les événements Google Calendar pour chaque membre de l'équipe pour cette période. Utilise l'email de chaque personne pour chercher leurs calendriers.
2. Pour chaque membre, calcule :
   - Le nombre total d'événements/réunions
   - Le nombre total d'heures de réunions (en estimant 1h par défaut si pas de durée)
   - Les jours les plus chargés
3. Identifie les créneaux de surcharge (>6h de réunions/jour)
4. Liste les 5 prochains événements importants de l'équipe

Réponds UNIQUEMENT avec un JSON valide (sans backticks, sans explication), avec cette structure exacte :
{
  "members": [
    {
      "email": "email@itroom.fr",
      "name": "Prénom Nom",
      "total_events": 12,
      "total_hours": 18.5,
      "busiest_day": "Mardi 8 avril",
      "busiest_day_hours": 6.5,
      "events_per_day": {"Lun": 3, "Mar": 5, "Mer": 2, "Jeu": 4, "Ven": 1},
      "overloaded_days": ["Mardi 8 avril"]
    }
  ],
  "team_events": [
    {
      "title": "Réunion équipe",
      "date": "Lundi 7 avril",
      "time": "10:00",
      "duration_h": 1,
      "attendees": ["lklapka@itroom.fr", "fkosinski@itroom.fr"]
    }
  ],
  "summary": "Résumé court de la charge de l'équipe cette semaine (2-3 phrases)"
}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 3000,
      system: "Tu es un assistant d'analyse de charge de travail. Tu utilises Google Calendar MCP pour récupérer les événements réels. Tu réponds UNIQUEMENT en JSON valide, sans aucun texte avant ou après.",
      messages: [{ role: 'user', content: prompt }],
      mcp_servers: [
        { type: 'url', url: 'https://gcal.mcp.claude.com/mcp', name: 'google-calendar' }
      ]
    })
  });

  if (!response.ok) throw new Error(`API error: ${response.status}`);
  const data = await response.json();
  
  // Extract text from response (may have mcp_tool_use blocks)
  let text = '';
  for (const block of data.content || []) {
    if (block.type === 'text') text += block.text;
  }
  
  // Clean and parse JSON
  const clean = text.replace(/```json|```/g, '').trim();
  try {
    return JSON.parse(clean);
  } catch(e) {
    // Try to extract JSON from the text
    const match = clean.match(/\{[\s\S]*\}/);
    if (match) return JSON.parse(match[0]);
    throw new Error('Réponse non parseable : ' + clean.substring(0, 200));
  }
}

function getStatus(hours, maxH) {
  const ratio = hours / maxH;
  if (ratio >= 0.75) return { label: 'Surchargé', cls: 'status-over' };
  if (ratio >= 0.5) return { label: 'Occupé', cls: 'status-warn' };
  return { label: 'OK', cls: 'status-ok' };
}

function renderDashboard(data, start, end) {
  if (!data || !data.members) {
    document.getElementById('content').innerHTML = '<div class="error-box">Données insuffisantes reçues.</div>';
    return;
  }

  const members = data.members || [];
  const teamEvents = data.team_events || [];
  const summary = data.summary || '';
  
  const totalHours = members.reduce((s, m) => s + (m.total_hours || 0), 0);
  const totalEvents = members.reduce((s, m) => s + (m.total_events || 0), 0);
  const maxH = Math.max(...members.map(m => m.total_hours || 0), 1);
  const overloaded = members.filter(m => (m.overloaded_days || []).length > 0).length;
  const avgH = members.length ? (totalHours / members.length).toFixed(1) : 0;

  const days = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven'];
  
  // Build chart datasets
  const datasets = members.map((m, i) => {
    const mem = TEAM.find(t => t.email === m.email) || TEAM[i] || {};
    return {
      label: mem.name || m.name,
      data: days.map(d => (m.events_per_day || {})[d] || 0),
      backgroundColor: BAR_COLORS[i] + 'cc',
      borderColor: BAR_COLORS[i],
      borderWidth: 1,
      borderRadius: 3,
    };
  });

  document.getElementById('content').innerHTML = `
    <div class="metrics">
      <div class="metric-card">
        <div class="label">Total événements</div>
        <div class="value">${totalEvents}</div>
        <div class="sub">sur la période</div>
      </div>
      <div class="metric-card">
        <div class="label">Heures de réunion</div>
        <div class="value">${totalHours.toFixed(0)}h</div>
        <div class="sub">équipe complète</div>
      </div>
      <div class="metric-card">
        <div class="label">Moy. par personne</div>
        <div class="value">${avgH}h</div>
        <div class="sub">par semaine</div>
      </div>
      <div class="metric-card">
        <div class="label">Surcharges détectées</div>
        <div class="value" style="color:${overloaded > 0 ? '#a32d2d' : '#3b6d11'}">${overloaded}</div>
        <div class="sub">membres concernés</div>
      </div>
    </div>

    ${summary ? `<div class="card"><h2>Analyse IA</h2><div class="ai-box">${summary}</div></div>` : ''}

    <div class="card">
      <h2>Charge par membre · ${fmtDate(start)} – ${fmtDate(end)}</h2>
      ${members.map((m, i) => {
        const mem = TEAM.find(t => t.email === m.email) || TEAM[i] || {};
        const pct = Math.round(((m.total_hours || 0) / maxH) * 100);
        const st = getStatus(m.total_hours || 0, maxH);
        return `
        <div class="person-row">
          <div class="avatar" style="background:${mem.color}22;color:${mem.color}">${mem.initials || '??'}</div>
          <div class="person-info">
            <div class="person-name">${mem.name || m.name}</div>
            <div class="person-email">${m.email}</div>
          </div>
          <div class="bar-wrap">
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%;background:${mem.color}"></div>
            </div>
            <div class="bar-label">${m.total_hours || 0}h · ${m.total_events || 0} évts</div>
          </div>
          <span class="status-badge ${st.cls}">${st.label}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="card">
      <h2>Réunions par jour (par membre)</h2>
      <div class="legend">
        ${TEAM.map((m,i) => `<div class="legend-item"><div class="legend-dot" style="background:${BAR_COLORS[i]}"></div>${m.name}</div>`).join('')}
      </div>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>

    ${teamEvents.length > 0 ? `
    <div class="card">
      <h2>Prochains événements équipe</h2>
      <div class="event-list">
        ${teamEvents.slice(0,8).map((ev, i) => `
          <div class="event-item">
            <div class="event-dot" style="background:${BAR_COLORS[i % BAR_COLORS.length]}"></div>
            <div>
              <div class="event-title">${ev.title}</div>
              <div class="event-meta">${ev.date}${ev.time ? ' · ' + ev.time : ''}${ev.duration_h ? ' · ' + ev.duration_h + 'h' : ''}${ev.attendees && ev.attendees.length > 0 ? ' · ' + ev.attendees.length + ' participants' : ''}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}
  `;

  // Render chart
  setTimeout(() => {
    const ctx = document.getElementById('barChart');
    if (!ctx) return;
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: { labels: days, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { stacked: false, grid: { display: false }, ticks: { font: { size: 12 } } },
          y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { font: { size: 11 }, stepSize: 1 } }
        }
      }
    });
  }, 50);
}

// Auto-load on start
loadData();
</script>
</body>
</html>
